<style>
:root {
  color-scheme: light;
  --surface: #F7F7F8;
  --surface-muted: #EFEFF2;
  --text: #171717;
  --text-muted: #52525B;
  --border: rgba(23, 23, 23, 0.12);
  --brand: #4B3FE3;
  --brand-soft: #F2F7FF;
  --brand-soft-strong: #E5EAFF;
  --brand-text: #1A1759;
  --brand-on: #FFFFFF;
  --chart-series-1: #3C2ECA;
  --chart-series-2: #A9AEFF;
  --chart-series-3: #6F6FFF;
  --chart-series-4: #22A5F7;
  --chart-other: #D3D4DA;
  --accent: #27D2BF;
  --accent-soft: #EAFBF8;
  --accent-text: #0F766E;
  --success: #1DC981;
  --warning: #EFAA17;
  --danger: #E8463A;
  --radius: 8px;
  --radius-card: 12px;
  --radius-full: 999px;
  --spacer-4: 4px;
  --spacer-8: 8px;
  --spacer-12: 12px;
  --spacer-16: 16px;
  --spacer-20: 20px;
  --spacer-24: 24px;
  --font-sans: "SF Pro Text", "PingFang SC", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --font-metric: "Inter", "SF Pro Text", "PingFang SC", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --weight-regular: 400;
  --weight-medium: 500;
  --weight-strong: 600;
  --text-caption: 12px/18px;
  --text-body: 14px/20px;
  --text-title: 16px/24px;
  --text-code: 13px/20px;
}

@media (prefers-color-scheme: dark) {
  :root {
    color-scheme: dark;
    --surface: #171717;
    --surface-muted: #262626;
    --text: #E5E5E5;
    --text-muted: #A1A1AA;
    --border: rgba(229, 229, 229, 0.12);
    --brand: #6054F1;
    --brand-soft: #1A1759;
    --brand-soft-strong: #3C2ECA;
    --brand-text: #CFD8FF;
    --chart-series-1: #4B3FE3;
    --chart-other: #D3D4DA;
    --accent-soft: #123F3C;
    --accent-text: #CCFBF1;
  }
}

.widget {
  color: var(--text);
  background: transparent;
  font: var(--weight-regular) var(--text-body) var(--font-sans);
  letter-spacing: 0;
  width: 100%;
}

.chartCard {
  box-sizing: border-box;
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  padding: var(--spacer-20);
}

.chartHeader {
  display: grid;
  gap: var(--spacer-4);
  justify-items: center;
  text-align: center;
}

.chartTitle {
  margin: 0;
  color: var(--text);
  font: var(--weight-medium) var(--text-title) var(--font-sans);
}


.chartShell {
  position: relative;
  width: min(300px, 100%);
  height: min(300px, calc(100vw - 80px));
  min-height: 232px;
  max-height: 300px;
  margin: var(--spacer-16) auto 0;
}

.chartShell canvas {
  position: absolute;
  inset: 0;
  z-index: 1;
}

.chartFallback {
  position: absolute;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  transition: opacity 160ms ease;
}

.chartFallback[data-ready="true"] {
  opacity: 0;
}

.radarSvg {
  display: block;
  width: 100%;
  height: 100%;
  overflow: visible;
}

.radarGrid {
  fill: none;
  stroke: color-mix(in srgb, var(--border) 44%, transparent);
  stroke-width: 1;
}

.radarLine {
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.radarLine.desktop {
  stroke: var(--chart-series-1);
}

.radarLine.mobile {
  stroke: var(--chart-series-2);
}

.radarLabel {
  fill: var(--text-muted);
  font: var(--weight-regular) var(--text-caption) var(--font-sans);
}

.chartLegend {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: var(--spacer-12);
  margin-top: var(--spacer-8);
  color: var(--text-muted);
  font: var(--weight-regular) var(--text-caption) var(--font-sans);
}

.legendItem {
  display: inline-flex;
  align-items: center;
  gap: var(--spacer-8);
}

.legendLine {
  width: 16px;
  height: 2px;
  border-radius: var(--radius-full);
}

.legendLine.desktop {
  background: var(--chart-series-1);
}

.legendLine.mobile {
  background: var(--chart-series-2);
}

.chartStatus {
  max-height: 0;
  margin: 0;
  overflow: hidden;
  color: var(--text-muted);
  font: var(--weight-regular) var(--text-caption) var(--font-sans);
  opacity: 0;
  text-align: center;
}

.chartCard[data-error="true"] .chartStatus {
  max-height: 40px;
  margin: var(--spacer-8) 0 0;
  opacity: 1;
}

.chartTooltip {
  --tooltip-x: 0px;
  --tooltip-y: 0px;
  position: absolute;
  top: 0;
  left: 0;
  z-index: 2;
  min-width: 154px;
  padding: 6px 10px;
  color: var(--text);
  background: color-mix(in srgb, var(--surface) 96%, #FFFFFF);
  border: 1px solid color-mix(in srgb, var(--border) 72%, transparent);
  border-radius: var(--radius);
  box-shadow: 0 8px 24px rgba(23, 23, 23, 0.08);
  opacity: 0;
  pointer-events: none;
  transform: translate3d(var(--tooltip-x), var(--tooltip-y), 0) translate(-50%, calc(-100% - 10px));
  transition: opacity 120ms ease, transform 120ms ease;
}

@media (prefers-color-scheme: dark) {
  .chartTooltip {
    background: color-mix(in srgb, var(--surface) 92%, #000000);
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
  }
}

.chartTooltip[data-visible="true"] {
  opacity: 1;
}

.chartTooltip[data-placement="bottom"] {
  transform: translate3d(var(--tooltip-x), var(--tooltip-y), 0) translate(-50%, 10px);
}

.tooltipTitle {
  margin-bottom: var(--spacer-4);
  color: var(--text);
  font: var(--weight-medium) var(--text-caption) var(--font-sans);
}

.tooltipRow {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: var(--spacer-8);
  font: var(--weight-regular) var(--text-caption) var(--font-sans);
}

.tooltipRow + .tooltipRow {
  margin-top: var(--spacer-4);
}

.tooltipRow[data-active="false"] {
  max-height: 0;
  margin-top: 0;
  overflow: hidden;
  opacity: 0;
}

.tooltipDot {
  display: block;
  width: 8px;
  height: 8px;
  border-radius: var(--radius-full);
}

.tooltipDot.desktop {
  background: var(--chart-series-1);
}

.tooltipDot.mobile {
  background: var(--chart-series-2);
}

.tooltipName {
  color: var(--text-muted);
}

.tooltipValue {
  color: var(--text);
  font: var(--weight-medium) var(--text-code) var(--font-mono);
  font-variant-numeric: tabular-nums;
}


@media (max-width: 520px) {
  .chartCard {
    padding: var(--spacer-16);
  }

  .chartShell {
    height: 232px;
  }
}
</style>
<div class="widget" data-dynamic-ui-widget data-template="radar-chart-lines-only">
  <section class="chartCard" aria-label="Radar chart comparing desktop and mobile visitors">
    <div class="chartHeader">
      <h3 class="chartTitle">Radar Chart - Lines Only</h3>
    </div>
    <div class="chartShell">
      <canvas aria-label="Desktop and mobile visitors by month" role="img"></canvas>
      <div class="chartFallback" aria-hidden="true">
        <svg class="radarSvg" viewBox="0 0 300 250" role="img" aria-label="Static radar chart fallback">
          <polygon class="radarGrid" points="150,97.5 167.8,107.8 167.8,128.3 150,138.5 132.2,128.3 132.2,107.8"/>
          <polygon class="radarGrid" points="150,77 185.5,97.5 185.5,138.5 150,159 114.5,138.5 114.5,97.5"/>
          <polygon class="radarGrid" points="150,56.5 203.3,87.3 203.3,148.8 150,179.5 96.7,148.8 96.7,87.3"/>
          <polygon class="radarGrid" points="150,36 221,77 221,159 150,200 79,159 79,77"/>
          <polyline class="radarLine desktop" points="150,70.3 209.6,83.1 217.7,156.4 150,179 98.4,147.8 93.9,85.6 150,70.3"/>
          <polyline class="radarLine mobile" points="150,85.4 204.9,86.3 208.1,151.1 150,177.6 89.8,152.9 85.8,79.9 150,85.4"/>
          <text class="radarLabel" x="150" y="16" text-anchor="middle">Jan</text>
          <text class="radarLabel" x="242" y="69" text-anchor="middle">Feb</text>
          <text class="radarLabel" x="242" y="175" text-anchor="middle">Mar</text>
          <text class="radarLabel" x="150" y="228" text-anchor="middle">Apr</text>
          <text class="radarLabel" x="58" y="175" text-anchor="middle">May</text>
          <text class="radarLabel" x="58" y="69" text-anchor="middle">Jun</text>
        </svg>
      </div>
      <div class="chartTooltip" data-visible="false" data-placement="top" aria-hidden="true">
        <div class="tooltipTitle">January</div>
        <div class="tooltipRow" data-series="desktop">
          <span class="tooltipDot desktop"></span>
          <span class="tooltipName">Desktop</span>
          <span class="tooltipValue">0</span>
        </div>
        <div class="tooltipRow" data-series="mobile">
          <span class="tooltipDot mobile"></span>
          <span class="tooltipName">Mobile</span>
          <span class="tooltipValue">0</span>
        </div>
      </div>
    </div>
    <div class="chartLegend" aria-label="Chart legend">
      <span class="legendItem"><span class="legendLine desktop"></span><span>Desktop</span></span>
      <span class="legendItem"><span class="legendLine mobile"></span><span>Mobile</span></span>
    </div>
    <p class="chartStatus">Chart runtime failed to load; static fallback remains visible.</p>
  </section>
</div>
<script>
(() => {
  const rootSelector = '.widget[data-dynamic-ui-widget][data-template="radar-chart-lines-only"]:not([data-mounted])';
  const widgets = Array.from(document.querySelectorAll(rootSelector));
  if (widgets.length === 0) {
    return;
  }

  const chartData = [
    { month: "January", desktop: 186, mobile: 160 },
    { month: "February", desktop: 185, mobile: 170 },
    { month: "March", desktop: 207, mobile: 180 },
    { month: "April", desktop: 173, mobile: 160 },
    { month: "May", desktop: 160, mobile: 190 },
    { month: "June", desktop: 174, mobile: 204 }
  ];
  const angleDataKey = "month";
  const seriesKeys = ["desktop", "mobile"];
  const chartConfig = {
    desktop: {
      label: "Desktop",
      color: "var(--chart-series-1)"
    },
    mobile: {
      label: "Mobile",
      color: "var(--chart-series-2)"
    }
  };

  const loadChartJs = (onReady, onError) => {
    if (window.Chart) {
      onReady();
      return;
    }

    const existingLoader = document.querySelector('script[data-dynamic-ui-chartjs="true"]');
    if (existingLoader) {
      if (existingLoader.dataset.status === "ready" && window.Chart) {
        onReady();
        return;
      }
      if (existingLoader.dataset.status === "error") {
        onError();
        return;
      }
      existingLoader.addEventListener("load", onReady, { once: true });
      existingLoader.addEventListener("error", onError, { once: true });
      return;
    }

    const loader = document.createElement("script");
    loader.src = "https://cdn.jsdelivr.net/npm/chart.js@4";
    loader.async = true;
    loader.dataset.dynamicUiChartjs = "true";
    loader.dataset.status = "loading";
    loader.onload = () => {
      loader.dataset.status = "ready";
      onReady();
    };
    loader.onerror = () => {
      loader.dataset.status = "error";
      onError();
    };
    (document.head || document.documentElement).appendChild(loader);
  };

  const initWidget = (widget) => {
    widget.dataset.mounted = "true";
    const canvas = widget.querySelector("canvas");
    const fallback = widget.querySelector(".chartFallback");
    const status = widget.querySelector(".chartStatus");
    const card = widget.querySelector(".chartCard");
    const tooltipEl = widget.querySelector(".chartTooltip");
    const tooltipTitle = widget.querySelector(".tooltipTitle");
    const tooltipRows = Array.from(widget.querySelectorAll(".tooltipRow"));
    const styles = getComputedStyle(widget);
    const readVar = (name) => styles.getPropertyValue(name).trim();
    const resolveColor = (value) => {
      const match = /^var\((--[^)]+)\)$/.exec(value.trim());
      return match ? readVar(match[1]) || value : value;
    };
    const fadeRgba = (value, factor) => {
      const match = /rgba?\(([^)]+)\)/.exec(value);
      if (!match) {
        return value;
      }
      const parts = match[1].split(",").map((part) => part.trim());
      const currentAlpha = parts[3] === undefined ? 1 : Number.parseFloat(parts[3]);
      const nextAlpha = Number.isFinite(currentAlpha) ? Math.max(0, Math.min(1, currentAlpha * factor)) : 0.05;
      return `rgba(${parts[0]}, ${parts[1]}, ${parts[2]}, ${nextAlpha})`;
    };
    const toRadarValue = (raw) => {
      return typeof raw === "number" && Number.isFinite(raw) && raw >= 0 ? raw : null;
    };
    const rows = chartData
      .map((row) => {
        const label = String(row[angleDataKey] ?? "");
        const values = {};
        seriesKeys.forEach((key) => {
          values[key] = toRadarValue(row[key]);
        });
        return { label, values };
      })
      .filter((row) => row.label.length > 0);
    const hasValues = rows.some((row) => seriesKeys.some((key) => row.values[key] !== null));

    if (!canvas || rows.length === 0 || !hasValues) {
      if (card) {
        card.dataset.error = "true";
      }
      if (status) {
        status.textContent = "No valid chart data available.";
      }
      return;
    }

    const renderChart = () => {
      const colors = seriesKeys.map((key) => resolveColor(chartConfig[key].color));
      const textMuted = readVar("--text-muted");
      const border = readVar("--border");
      const surface = readVar("--surface");
      const grid = fadeRgba(border, 0.44);
      const ctx = canvas.getContext("2d");
      if (!ctx || !window.Chart) {
        return;
      }

      const externalTooltip = ({ chart, tooltip }) => {
        if (!tooltipEl || tooltipRows.length === 0) {
          return;
        }
        if (tooltip.opacity === 0 || !tooltip.dataPoints || tooltip.dataPoints.length === 0) {
          tooltipEl.dataset.visible = "false";
          tooltipEl.setAttribute("aria-hidden", "true");
          return;
        }

        const firstPoint = tooltip.dataPoints[0];
        const activeLabel = rows[firstPoint.dataIndex]?.label || "";
        if (tooltipTitle) {
          tooltipTitle.textContent = activeLabel;
        }

        const activeValues = rows[firstPoint.dataIndex]?.values || {};
        tooltipRows.forEach((rowEl) => {
          const key = rowEl.dataset.series;
          const name = rowEl.querySelector(".tooltipName");
          const value = rowEl.querySelector(".tooltipValue");
          const rawValue = key ? activeValues[key] : null;
          if (!key || !name || !value || rawValue === null || rawValue === undefined) {
            rowEl.dataset.active = "false";
            return;
          }
          name.textContent = chartConfig[key].label;
          value.textContent = rawValue.toLocaleString();
          rowEl.dataset.active = "true";
        });

        const width = chart.width;
        const tooltipWidth = tooltipEl.offsetWidth || 154;
        const minX = tooltipWidth / 2 + 6;
        const maxX = Math.max(minX, width - tooltipWidth / 2 - 6);
        const x = Math.min(Math.max(tooltip.caretX, minX), maxX);
        const y = tooltip.caretY;
        tooltipEl.dataset.placement = y < 58 ? "bottom" : "top";
        tooltipEl.style.setProperty("--tooltip-x", `${Math.round(x)}px`);
        tooltipEl.style.setProperty("--tooltip-y", `${Math.round(y)}px`);
        tooltipEl.dataset.visible = "true";
        tooltipEl.setAttribute("aria-hidden", "false");
      };

      new window.Chart(ctx, {
        type: "radar",
        data: {
          labels: rows.map((row) => row.label.slice(0, 3)),
          datasets: seriesKeys.map((key, index) => ({
            key,
            label: chartConfig[key].label,
            data: rows.map((row) => row.values[key]),
            backgroundColor: "transparent",
            borderColor: colors[index],
            borderWidth: 2,
            pointRadius: 0,
            pointHoverRadius: 3.5,
            pointHitRadius: 18,
            pointBackgroundColor: surface,
            pointHoverBackgroundColor: surface,
            pointHoverBorderColor: colors[index],
            pointHoverBorderWidth: 2,
            fill: false
          }))
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: {
            duration: 220,
            easing: "easeOutQuart"
          },
          transitions: {
            active: {
              animation: {
                duration: 120,
                easing: "easeOutQuart"
              }
            }
          },
          interaction: {
            intersect: false,
            mode: "nearest"
          },
          hover: {
            intersect: false,
            mode: "nearest"
          },
          layout: {
            padding: { top: 4, right: 16, bottom: 4, left: 16 }
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              enabled: false,
              external: externalTooltip
            }
          },
          scales: {
            r: {
              beginAtZero: true,
              suggestedMax: 220,
              border: { display: false },
              angleLines: {
                display: false
              },
              grid: {
                color: grid,
                lineWidth: 1
              },
              pointLabels: {
                color: textMuted,
                padding: 10,
                font: { size: 12, family: readVar("--font-sans") }
              },
              ticks: {
                display: false,
                stepSize: 55,
                backdropColor: "transparent"
              }
            }
          }
        }
      });

      if (fallback) {
        fallback.dataset.ready = "true";
      }
      if (status) {
        status.textContent = "";
      }
    };

    loadChartJs(renderChart, () => {
      if (card) {
        card.dataset.error = "true";
      }
      if (status) {
        status.textContent = "Chart runtime failed to load; static fallback remains visible.";
      }
    });
  };

  widgets.forEach(initWidget);
})();
</script>
