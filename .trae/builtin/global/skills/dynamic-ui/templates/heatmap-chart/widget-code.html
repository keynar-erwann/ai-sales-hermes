<style>
:root {
  color-scheme: light;
  --surface: #F7F7F8;
  --surface-muted: #EFEFF2;
  --text: #171717;
  --text-muted: #52525B;
  --border: rgba(23, 23, 23, 0.12);
  --brand: #4B3FE3;
  --brand-soft: #F2F7FF;
  --brand-soft-strong: #E5EAFF;
  --brand-text: #1A1759;
  --brand-on: #FFFFFF;
  --chart-series-1: #3C2ECA;
  --chart-series-2: #A9AEFF;
  --chart-series-3: #6F6FFF;
  --chart-series-4: #22A5F7;
  --chart-other: #D3D4DA;
  --accent: #27D2BF;
  --accent-soft: #EAFBF8;
  --accent-text: #0F766E;
  --success: #1DC981;
  --warning: #EFAA17;
  --danger: #E8463A;
  --radius: 8px;
  --radius-card: 12px;
  --radius-full: 999px;
  --spacer-4: 4px;
  --spacer-8: 8px;
  --spacer-12: 12px;
  --spacer-16: 16px;
  --spacer-20: 20px;
  --spacer-24: 24px;
  --font-sans: "SF Pro Text", "PingFang SC", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --font-metric: "Inter", "SF Pro Text", "PingFang SC", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --weight-regular: 400;
  --weight-medium: 500;
  --weight-strong: 600;
  --text-caption: 12px/18px;
  --text-body: 14px/20px;
  --text-title: 16px/24px;
  --text-code: 13px/20px;
}

@media (prefers-color-scheme: dark) {
  :root {
    color-scheme: dark;
    --surface: #171717;
    --surface-muted: #262626;
    --text: #E5E5E5;
    --text-muted: #A1A1AA;
    --border: rgba(229, 229, 229, 0.12);
    --brand: #6054F1;
    --brand-soft: #1A1759;
    --brand-soft-strong: #3C2ECA;
    --brand-text: #CFD8FF;
    --chart-series-1: #4B3FE3;
    --chart-other: #D3D4DA;
    --accent-soft: #123F3C;
    --accent-text: #CCFBF1;
  }
}

.widget {
  color: var(--text);
  background: transparent;
  font: var(--weight-regular) var(--text-body) var(--font-sans);
  letter-spacing: 0;
  width: 100%;
}

.chartCard {
  box-sizing: border-box;
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  padding: var(--spacer-20);
}

.chartHeader {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--spacer-16);
}

.chartTitleBlock {
  display: grid;
  gap: var(--spacer-4);
  min-width: 0;
}

.chartTitle {
  margin: 0;
  color: var(--text);
  font: var(--weight-medium) var(--text-title) var(--font-sans);
}


.peakBadge {
  flex: 0 0 auto;
  padding: 3px 9px;
  color: var(--brand-text);
  background: color-mix(in srgb, var(--surface-muted) 72%, var(--surface));
  border: 1px solid color-mix(in srgb, var(--brand) 18%, var(--border));
  border-radius: var(--radius-full);
  font: var(--weight-medium) var(--text-caption) var(--font-sans);
  white-space: nowrap;
}

.chartShell {
  position: relative;
  margin-top: var(--spacer-16);
}

.heatmapSvg {
  display: block;
  width: 100%;
  height: auto;
  overflow: visible;
}

.monthLabel {
  fill: var(--text-muted);
  font: var(--weight-medium) var(--text-caption) var(--font-sans);
  letter-spacing: 0;
}

.axisLabel {
  fill: var(--text-muted);
  font: var(--weight-regular) var(--text-caption) var(--font-sans);
  letter-spacing: 0;
}

.heatmapCell {
  fill: var(--surface-muted);
  stroke: color-mix(in srgb, var(--border) 72%, transparent);
  stroke-width: 0.8;
  cursor: pointer;
  opacity: 1;
  transition: opacity 140ms ease, stroke 140ms ease, stroke-opacity 140ms ease, transform 140ms ease;
  transform-box: fill-box;
  transform-origin: center;
}

.heatmapCell[data-level="1"] {
  fill: color-mix(in srgb, var(--chart-series-2) 28%, var(--surface));
}

.heatmapCell[data-level="2"] {
  fill: color-mix(in srgb, var(--chart-series-2) 62%, var(--surface));
}

.heatmapCell[data-level="3"] {
  fill: var(--chart-series-3);
}

.heatmapCell[data-level="4"] {
  fill: var(--chart-series-1);
}

.heatmapCell:hover,
.heatmapCell:focus {
  outline: none;
  stroke: var(--text);
  stroke-opacity: 0.52;
  transform: scale(1.08);
}

.chartCard[data-active-level] .heatmapCell {
  opacity: 0.24;
}

.chartCard[data-active-level="0"] .heatmapCell[data-level="0"],
.chartCard[data-active-level="1"] .heatmapCell[data-level="1"],
.chartCard[data-active-level="2"] .heatmapCell[data-level="2"],
.chartCard[data-active-level="3"] .heatmapCell[data-level="3"],
.chartCard[data-active-level="4"] .heatmapCell[data-level="4"] {
  opacity: 1;
  stroke: var(--text);
  stroke-opacity: 0.38;
}

.chartTooltip {
  --tooltip-x: 0px;
  --tooltip-y: 0px;
  position: absolute;
  top: 0;
  left: 0;
  z-index: 2;
  min-width: 156px;
  padding: 7px 10px;
  color: var(--text);
  background: color-mix(in srgb, var(--surface) 96%, #FFFFFF);
  border: 1px solid color-mix(in srgb, var(--border) 72%, transparent);
  border-radius: var(--radius);
  box-shadow: 0 8px 24px rgba(23, 23, 23, 0.08);
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transform: translate3d(var(--tooltip-x), var(--tooltip-y), 0) translate(-50%, calc(-100% - 10px));
  transition: opacity 120ms ease, transform 120ms ease, visibility 120ms ease;
}

@media (prefers-color-scheme: dark) {
  .chartTooltip {
    background: color-mix(in srgb, var(--surface) 92%, #000000);
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
  }
}

.chartTooltip[data-visible="true"] {
  opacity: 1;
  visibility: visible;
}

.chartTooltip[data-placement="bottom"] {
  transform: translate3d(var(--tooltip-x), var(--tooltip-y), 0) translate(-50%, 10px);
}

.tooltipRow {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: var(--spacer-8);
  font: var(--weight-regular) var(--text-caption) var(--font-sans);
}

.tooltipDot {
  box-sizing: border-box;
  display: block;
  width: 8px;
  height: 8px;
  border-radius: var(--radius-full);
  background: var(--surface-muted);
  border: 1px solid color-mix(in srgb, var(--border) 72%, transparent);
}

.tooltipDot[data-level="1"] {
  background: color-mix(in srgb, var(--chart-series-2) 28%, var(--surface));
}

.tooltipDot[data-level="2"] {
  background: color-mix(in srgb, var(--chart-series-2) 62%, var(--surface));
}

.tooltipDot[data-level="3"] {
  background: var(--chart-series-3);
  border-color: transparent;
}

.tooltipDot[data-level="4"] {
  background: var(--chart-series-1);
  border-color: transparent;
}

.tooltipName {
  color: var(--text-muted);
}

.tooltipValue {
  color: var(--text);
  font: var(--weight-medium) var(--text-caption) var(--font-sans);
  font-variant-numeric: tabular-nums;
}

.tooltipLevel {
  display: block;
  margin-top: 2px;
  padding-left: calc(8px + var(--spacer-8));
  color: var(--text-muted);
  font: var(--weight-regular) var(--text-caption) var(--font-sans);
}

.heatmapLegend {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: var(--spacer-8);
  margin-top: var(--spacer-12);
  color: var(--text-muted);
  font: var(--weight-regular) var(--text-caption) var(--font-sans);
}

.legendScale {
  display: inline-flex;
  align-items: center;
  gap: var(--spacer-4);
}

.legendButton {
  width: 15px;
  height: 15px;
  padding: 0;
  appearance: none;
  background: var(--surface-muted);
  border: 1px solid color-mix(in srgb, var(--border) 72%, transparent);
  border-radius: calc(var(--radius) / 2);
  cursor: pointer;
}

.legendButton[data-level="1"] {
  background: color-mix(in srgb, var(--chart-series-2) 28%, var(--surface));
}

.legendButton[data-level="2"] {
  background: color-mix(in srgb, var(--chart-series-2) 62%, var(--surface));
}

.legendButton[data-level="3"] {
  background: var(--chart-series-3);
}

.legendButton[data-level="4"] {
  background: var(--chart-series-1);
}

.legendButton:hover,
.legendButton:focus,
.legendButton[data-active="true"],
.legendButton[aria-pressed="true"] {
  outline: none;
  border-color: var(--brand);
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--brand) 18%, transparent);
}


@media (prefers-reduced-motion: no-preference) {
  .heatmapCell {
    animation: heatmapCellIn 420ms ease both;
    animation-delay: calc(var(--i) * 8ms);
  }

  @keyframes heatmapCellIn {
    from {
      opacity: 0;
      transform: translateY(3px) scale(0.94);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }
}

@media (max-width: 520px) {
  .chartCard {
    padding: var(--spacer-16);
  }

  .chartHeader {
    display: grid;
    gap: var(--spacer-8);
  }

  .peakBadge {
    width: max-content;
  }

  .heatmapLegend {
    justify-content: flex-start;
  }
}

<script>
(() => {
  const rootSelector = '.widget[data-dynamic-ui-widget][data-template="heatmap-chart"]:not([data-mounted])';
  const widgets = Array.from(document.querySelectorAll(rootSelector));
  if (widgets.length === 0) {
    return;
  }

  const levelLabels = ["None", "Low", "Medium", "High", "Peak"];
  const formatDate = (value) => {
    const date = new Date(`${value}T00:00:00`);
    if (Number.isNaN(date.getTime())) {
      return value;
    }
    return new Intl.DateTimeFormat("en-US", {
      month: "short",
      day: "numeric",
      year: "numeric"
    }).format(date);
  };

  const initWidget = (widget) => {
    widget.dataset.mounted = "true";
    const card = widget.querySelector(".chartCard");
    const shell = widget.querySelector(".chartShell");
    const tooltip = widget.querySelector(".chartTooltip");
    const tooltipDot = widget.querySelector(".tooltipDot");
    const tooltipName = widget.querySelector(".tooltipName");
    const tooltipValue = widget.querySelector(".tooltipValue");
    const tooltipLevel = widget.querySelector(".tooltipLevel");
    const cells = Array.from(widget.querySelectorAll(".heatmapCell"));
    const legendButtons = Array.from(widget.querySelectorAll(".legendButton"));
    let lockedLevel = null;

    if (!card || !shell || !tooltip || !tooltipDot || !tooltipName || !tooltipValue || !tooltipLevel) {
      return;
    }

    const setActiveLevel = (level) => {
      if (level === null) {
        delete card.dataset.activeLevel;
      } else {
        card.dataset.activeLevel = String(level);
      }
      legendButtons.forEach((button) => {
        button.dataset.active = level !== null && button.dataset.level === String(level) ? "true" : "false";
      });
    };

    const updatePressed = () => {
      legendButtons.forEach((button) => {
        button.setAttribute("aria-pressed", lockedLevel !== null && button.dataset.level === String(lockedLevel) ? "true" : "false");
      });
    };

    const clearTemporaryLevel = () => {
      setActiveLevel(lockedLevel);
    };

    const positionTooltip = (cell, event) => {
      const shellRect = shell.getBoundingClientRect();
      const cellRect = cell.getBoundingClientRect();
      const rawX = event && typeof event.clientX === "number"
        ? event.clientX - shellRect.left
        : cellRect.left + cellRect.width / 2 - shellRect.left;
      const rawY = event && typeof event.clientY === "number"
        ? event.clientY - shellRect.top
        : cellRect.top + cellRect.height / 2 - shellRect.top;
      const tooltipWidth = tooltip.offsetWidth || 156;
      const minX = tooltipWidth / 2 + 8;
      const maxX = Math.max(minX, shellRect.width - tooltipWidth / 2 - 8);
      const x = Math.min(Math.max(rawX, minX), maxX);
      const y = Math.min(Math.max(rawY, 12), shellRect.height - 12);
      tooltip.dataset.placement = y < 54 ? "bottom" : "top";
      tooltip.style.setProperty("--tooltip-x", `${Math.round(x)}px`);
      tooltip.style.setProperty("--tooltip-y", `${Math.round(y)}px`);
    };

    const showTooltip = (cell, event) => {
      const count = Number.parseInt(cell.dataset.count || "0", 10);
      const level = Math.max(0, Math.min(4, Number.parseInt(cell.dataset.level || "0", 10)));
      const safeCount = Number.isFinite(count) ? count : 0;
      tooltipDot.dataset.level = String(level);
      tooltipName.textContent = formatDate(cell.dataset.date || "");
      tooltipValue.textContent = `${safeCount} ${safeCount === 1 ? "contribution" : "contributions"}`;
      tooltipLevel.textContent = `Level ${level}: ${levelLabels[level]}`;
      positionTooltip(cell, event);
      tooltip.dataset.visible = "true";
      tooltip.setAttribute("aria-hidden", "false");
    };

    const hideTooltip = () => {
      tooltip.dataset.visible = "false";
      tooltip.setAttribute("aria-hidden", "true");
    };

    cells.forEach((cell) => {
      cell.addEventListener("pointerenter", (event) => showTooltip(cell, event));
      cell.addEventListener("pointermove", (event) => positionTooltip(cell, event));
      cell.addEventListener("pointerleave", hideTooltip);
      cell.addEventListener("focus", () => showTooltip(cell));
      cell.addEventListener("blur", hideTooltip);
    });

    legendButtons.forEach((button) => {
      const level = button.dataset.level;
      button.addEventListener("pointerenter", () => setActiveLevel(level));
      button.addEventListener("pointerleave", clearTemporaryLevel);
      button.addEventListener("focus", () => setActiveLevel(level));
      button.addEventListener("blur", clearTemporaryLevel);
      button.addEventListener("click", () => {
        lockedLevel = lockedLevel === level ? null : level;
        setActiveLevel(lockedLevel);
        updatePressed();
      });
    });

    updatePressed();
  };

  widgets.forEach(initWidget);
})();
</script>
