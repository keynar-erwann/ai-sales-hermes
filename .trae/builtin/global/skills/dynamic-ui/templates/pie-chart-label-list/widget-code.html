<style>
:root {
  color-scheme: light;
  --surface: #F7F7F8;
  --surface-muted: #EFEFF2;
  --text: #171717;
  --text-muted: #52525B;
  --border: rgba(23, 23, 23, 0.12);
  --brand: #4B3FE3;
  --brand-soft: #F2F7FF;
  --brand-soft-strong: #E5EAFF;
  --brand-text: #1A1759;
  --brand-on: #FFFFFF;
  --chart-series-1: #3C2ECA;
  --chart-series-2: #A9AEFF;
  --chart-series-3: #6F6FFF;
  --chart-series-4: #22A5F7;
  --chart-other: #D3D4DA;
  --accent: #27D2BF;
  --accent-soft: #EAFBF8;
  --accent-text: #0F766E;
  --success: #1DC981;
  --warning: #EFAA17;
  --danger: #E8463A;
  --radius: 8px;
  --radius-card: 12px;
  --radius-full: 999px;
  --spacer-4: 4px;
  --spacer-8: 8px;
  --spacer-12: 12px;
  --spacer-16: 16px;
  --spacer-20: 20px;
  --spacer-24: 24px;
  --font-sans: "SF Pro Text", "PingFang SC", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --font-metric: "Inter", "SF Pro Text", "PingFang SC", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --weight-regular: 400;
  --weight-medium: 500;
  --weight-strong: 600;
  --text-caption: 12px/18px;
  --text-body: 14px/20px;
  --text-title: 16px/24px;
  --text-code: 13px/20px;
}

@media (prefers-color-scheme: dark) {
  :root {
    color-scheme: dark;
    --surface: #171717;
    --surface-muted: #262626;
    --text: #E5E5E5;
    --text-muted: #A1A1AA;
    --border: rgba(229, 229, 229, 0.12);
    --brand: #6054F1;
    --brand-soft: #1A1759;
    --brand-soft-strong: #3C2ECA;
    --brand-text: #CFD8FF;
    --chart-series-1: #4B3FE3;
    --chart-other: #D3D4DA;
    --accent-soft: #123F3C;
    --accent-text: #CCFBF1;
  }
}

.widget {
  color: var(--text);
  background: transparent;
  font: var(--weight-regular) var(--text-body) var(--font-sans);
  letter-spacing: 0;
  width: 100%;
}

.chartCard {
  box-sizing: border-box;
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  padding: var(--spacer-20);
}

.chartHeader {
  display: grid;
  gap: var(--spacer-4);
  text-align: center;
}

.chartTitle {
  margin: 0;
  color: var(--text);
  font: var(--weight-medium) var(--text-title) var(--font-sans);
}


.chartShell {
  position: relative;
  width: min(100%, 250px);
  aspect-ratio: 1 / 1;
  margin: var(--spacer-16) auto 0;
}

.chartShell canvas {
  position: absolute;
  inset: 0;
  z-index: 1;
}

.chartFallback {
  position: absolute;
  inset: 0;
  z-index: 0;
  display: block;
  pointer-events: none;
  transition: opacity 120ms ease;
}

.chartFallback[data-ready="true"] {
  opacity: 0;
}

.fallbackSvg {
  display: block;
  width: 100%;
  height: 100%;
  overflow: visible;
}

.fallbackSlice {
  stroke: none;
  stroke-width: 0;
}

.fallbackSlice[data-key="chrome"] {
  fill: var(--chart-series-1);
}

.fallbackSlice[data-key="safari"] {
  fill: var(--chart-series-2);
}

.fallbackSlice[data-key="firefox"] {
  fill: var(--chart-series-3);
}

.fallbackSlice[data-key="edge"] {
  fill: var(--chart-series-4);
}

.fallbackSlice[data-key="other"] {
  fill: var(--chart-other);
}

.fallbackLabel {
  fill: var(--brand-on);
  font: var(--weight-medium) var(--text-caption) var(--font-sans);
  pointer-events: none;
}

.chartStatus {
  max-height: 0;
  margin: 0;
  overflow: hidden;
  color: var(--text-muted);
  font: var(--weight-regular) var(--text-caption) var(--font-sans);
  opacity: 0;
}

.chartCard[data-error="true"] .chartStatus {
  max-height: 40px;
  margin: var(--spacer-8) 0 0;
  opacity: 1;
}

.chartTooltip {
  --tooltip-x: 0px;
  --tooltip-y: 0px;
  position: absolute;
  top: 0;
  left: 0;
  z-index: 2;
  min-width: 136px;
  padding: 6px 10px;
  color: var(--text);
  background: color-mix(in srgb, var(--surface) 96%, #FFFFFF);
  border: 1px solid color-mix(in srgb, var(--border) 72%, transparent);
  border-radius: var(--radius);
  box-shadow: 0 8px 24px rgba(23, 23, 23, 0.08);
  opacity: 0;
  pointer-events: none;
  transform: translate3d(var(--tooltip-x), var(--tooltip-y), 0) translate(-50%, calc(-100% - 10px));
  transition: opacity 120ms ease, transform 120ms ease;
}

@media (prefers-color-scheme: dark) {
  .chartTooltip {
    background: color-mix(in srgb, var(--surface) 92%, #000000);
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
  }
}

.chartTooltip[data-visible="true"] {
  opacity: 1;
}

.chartTooltip[data-placement="bottom"] {
  transform: translate3d(var(--tooltip-x), var(--tooltip-y), 0) translate(-50%, 10px);
}

.tooltipRow {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: var(--spacer-8);
  font: var(--weight-regular) var(--text-caption) var(--font-sans);
}

.tooltipDot {
  display: block;
  width: 8px;
  height: 8px;
  border-radius: var(--radius-full);
  background: var(--chart-series-1);
}

.tooltipName {
  color: var(--text-muted);
}

.tooltipValue {
  color: var(--text);
  font: var(--weight-medium) var(--text-code) var(--font-mono);
  font-variant-numeric: tabular-nums;
}


@media (max-width: 420px) {
  .chartCard {
    padding: var(--spacer-16);
  }
}
</style>
<div class="widget" data-dynamic-ui-widget data-template="pie-chart-label-list">
  <section class="chartCard" aria-label="Pie chart showing visitor share by browser">
    <div class="chartHeader">
      <h3 class="chartTitle">Pie Chart - Label List</h3>
    </div>
    <div class="chartShell">
      <canvas aria-label="Visitor share by browser" role="img"></canvas>
      <div class="chartFallback" aria-hidden="true">
        <svg class="fallbackSvg" viewBox="0 0 260 260" role="img" aria-label="Visitor share by browser fallback">
          <path class="fallbackSlice" data-key="chrome" d="M 130 130 L 130.00 30.00 A 100 100 0 0 1 225.62 159.28 Z"/>
          <path class="fallbackSlice" data-key="safari" d="M 130 130 L 225.62 159.28 A 100 100 0 0 1 121.52 229.64 Z"/>
          <path class="fallbackSlice" data-key="firefox" d="M 130 130 L 121.52 229.64 A 100 100 0 0 1 32.32 151.40 Z"/>
          <path class="fallbackSlice" data-key="edge" d="M 130 130 L 32.32 151.40 A 100 100 0 0 1 72.60 48.11 Z"/>
          <path class="fallbackSlice" data-key="other" d="M 130 130 L 72.60 48.11 A 100 100 0 0 1 130.00 30.00 Z"/>
          <text class="fallbackLabel" data-key="chrome" x="176.14" y="95.88" text-anchor="middle">Chrome</text>
          <text class="fallbackLabel" data-key="safari" x="164.53" y="181.08" text-anchor="middle">Safari</text>
          <text class="fallbackLabel" data-key="firefox" x="88.94" y="176.82" text-anchor="middle">Firefox</text>
          <text class="fallbackLabel" data-key="edge" x="71.40" y="107.14" text-anchor="middle">Edge</text>
          <text class="fallbackLabel" data-key="other" x="110.25" y="67.41" text-anchor="middle">Other</text>
        </svg>
      </div>
      <div class="chartTooltip" data-visible="false" data-placement="top" aria-hidden="true">
        <div class="tooltipRow">
          <span class="tooltipDot"></span>
          <span class="tooltipName">Chrome</span>
          <span class="tooltipValue">275</span>
        </div>
      </div>
    </div>
    <p class="chartStatus">Chart runtime failed to load; static fallback remains visible.</p>
  </section>
</div>
<script>
(() => {
  const rootSelector = '.widget[data-dynamic-ui-widget][data-template="pie-chart-label-list"]:not([data-mounted])';
  const widgets = Array.from(document.querySelectorAll(rootSelector));
  if (widgets.length === 0) {
    return;
  }

  const chartData = [
    { browser: "chrome", visitors: 275, fill: "var(--chart-series-1)" },
    { browser: "safari", visitors: 200, fill: "var(--chart-series-2)" },
    { browser: "firefox", visitors: 187, fill: "var(--chart-series-3)" },
    { browser: "edge", visitors: 173, fill: "var(--chart-series-4)" },
    { browser: "other", visitors: 90, fill: "var(--chart-other)" }
  ];
  const categoryKey = "browser";
  const valueKey = "visitors";
  const chartConfig = {
    visitors: {
      label: "Visitors"
    },
    chrome: {
      label: "Chrome",
      color: "var(--chart-series-1)"
    },
    safari: {
      label: "Safari",
      color: "var(--chart-series-2)"
    },
    firefox: {
      label: "Firefox",
      color: "var(--chart-series-3)"
    },
    edge: {
      label: "Edge",
      color: "var(--chart-series-4)"
    },
    other: {
      label: "Other",
      color: "var(--chart-other)"
    }
  };

  const loadChartJs = (onReady, onError) => {
    if (window.Chart) {
      onReady();
      return;
    }

    const existingLoader = document.querySelector('script[data-dynamic-ui-chartjs="true"]');
    if (existingLoader) {
      if (existingLoader.dataset.status === "ready" && window.Chart) {
        onReady();
        return;
      }
      if (existingLoader.dataset.status === "error") {
        onError();
        return;
      }
      existingLoader.addEventListener("load", onReady, { once: true });
      existingLoader.addEventListener("error", onError, { once: true });
      return;
    }

    const loader = document.createElement("script");
    loader.src = "https://cdn.jsdelivr.net/npm/chart.js@4";
    loader.async = true;
    loader.dataset.dynamicUiChartjs = "true";
    loader.dataset.status = "loading";
    loader.onload = () => {
      loader.dataset.status = "ready";
      onReady();
    };
    loader.onerror = () => {
      loader.dataset.status = "error";
      onError();
    };
    (document.head || document.documentElement).appendChild(loader);
  };

  const initWidget = (widget) => {
    widget.dataset.mounted = "true";
    const canvas = widget.querySelector("canvas");
    const fallback = widget.querySelector(".chartFallback");
    const status = widget.querySelector(".chartStatus");
    const card = widget.querySelector(".chartCard");
    const tooltipEl = widget.querySelector(".chartTooltip");
    const tooltipDot = widget.querySelector(".tooltipDot");
    const tooltipName = widget.querySelector(".tooltipName");
    const tooltipValue = widget.querySelector(".tooltipValue");
    const styles = getComputedStyle(widget);
    const readVar = (name) => styles.getPropertyValue(name).trim();
    const resolveColor = (value) => {
      const raw = String(value || "").trim();
      const match = /^var\((--[^)]+)\)$/.exec(raw);
      return match ? readVar(match[1]) || raw : raw;
    };
    const formatNumber = (value) => new Intl.NumberFormat("en-US").format(value);
    const rows = chartData
      .map((row) => {
        const key = String(row[categoryKey] ?? "");
        const raw = row[valueKey];
        const value = typeof raw === "number" && Number.isFinite(raw) && raw > 0 ? raw : null;
        const config = chartConfig[key] || {};
        const colorToken = row.fill || config.color || "var(--brand)";
        return {
          key,
          label: String(config.label || key),
          value,
          color: resolveColor(colorToken)
        };
      })
      .filter((row) => row.key.length > 0 && row.value !== null);
    const total = rows.reduce((sum, row) => sum + row.value, 0);

    if (!canvas || total <= 0) {
      if (card) {
        card.dataset.error = "true";
      }
      if (status) {
        status.textContent = "No valid chart data available.";
      }
      return;
    }

    const renderChart = () => {
      const ctx = canvas.getContext("2d");
      if (!ctx || !window.Chart) {
        return;
      }

      const brandOn = readVar("--brand-on") || "#FFFFFF";
      const fontFamily = readVar("--font-sans");
      const resolveHoverColor = (color) => {
        const raw = String(color || "").trim();
        const match = /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.exec(raw);
        if (!match) {
          return raw;
        }

        const hex = match[1].length === 3
          ? match[1].split("").map((char) => char + char).join("")
          : match[1];
        const channels = [0, 2, 4].map((start) => parseInt(hex.slice(start, start + 2), 16));
        const luminance = channels[0] * 0.299 + channels[1] * 0.587 + channels[2] * 0.114;
        const hoverChannels = channels.map((channel) => {
          return luminance > 170
            ? Math.round(channel * 0.88)
            : Math.round(channel + (255 - channel) * 0.12);
        });
        return `rgb(${hoverChannels.join(", ")})`;
      };
      // Use the filled sector centroid so labels read as centered inside each slice.
      const getSliceLabelPoint = (arc) => {
        if (!arc || typeof arc.getProps !== "function") {
          return null;
        }

        const props = arc.getProps(["x", "y", "startAngle", "endAngle", "innerRadius", "outerRadius"], true);
        const angle = Math.abs(props.endAngle - props.startAngle);
        if (!Number.isFinite(angle) || angle <= 0) {
          return null;
        }

        const middleAngle = (props.startAngle + props.endAngle) / 2;
        const innerRadius = Math.max(0, props.innerRadius || 0);
        const outerRadius = Math.max(innerRadius, props.outerRadius || 0);
        const centroidRatio = (4 * Math.sin(angle / 2)) / (3 * angle);
        const radius = innerRadius + (outerRadius - innerRadius) * centroidRatio;
        return {
          x: props.x + Math.cos(middleAngle) * radius,
          y: props.y + Math.sin(middleAngle) * radius
        };
      };
      const labelPlugin = {
        id: "dynamicUiPieLabelList",
        afterDatasetsDraw(chart) {
          const meta = chart.getDatasetMeta(0);
          const context = chart.ctx;
          context.save();
          context.font = `500 12px ${fontFamily}`;
          context.textAlign = "center";
          context.textBaseline = "middle";
          meta.data.forEach((arc, index) => {
            const row = rows[index];
            const point = getSliceLabelPoint(arc);
            if (!row || row.value / total < 0.06 || !point) {
              return;
            }
            const label = row.label.length > 10 ? `${row.label.slice(0, 9)}...` : row.label;
            context.fillStyle = brandOn;
            context.fillText(label, point.x, point.y);
          });
          context.restore();
        }
      };

      const externalTooltip = ({ chart, tooltip }) => {
        if (!tooltipEl || !tooltipDot || !tooltipName || !tooltipValue) {
          return;
        }
        if (tooltip.opacity === 0 || !tooltip.dataPoints || tooltip.dataPoints.length === 0) {
          tooltipEl.dataset.visible = "false";
          return;
        }

        const point = tooltip.dataPoints[0];
        const row = rows[point.dataIndex];
        if (!row) {
          tooltipEl.dataset.visible = "false";
          return;
        }

        tooltipDot.style.backgroundColor = row.color;
        tooltipName.textContent = row.label;
        tooltipValue.textContent = formatNumber(row.value);

        const width = chart.width;
        const tooltipWidth = tooltipEl.offsetWidth || 136;
        const x = Math.min(Math.max(tooltip.caretX, tooltipWidth / 2 + 6), width - tooltipWidth / 2 - 6);
        const y = tooltip.caretY;
        tooltipEl.dataset.placement = y < 58 ? "bottom" : "top";
        tooltipEl.style.setProperty("--tooltip-x", `${Math.round(x)}px`);
        tooltipEl.style.setProperty("--tooltip-y", `${Math.round(y)}px`);
        tooltipEl.dataset.visible = "true";
      };

      new window.Chart(ctx, {
        type: "pie",
        data: {
          labels: rows.map((row) => row.label),
          datasets: [
            {
              label: chartConfig[valueKey].label,
              data: rows.map((row) => row.value),
              backgroundColor: rows.map((row) => row.color),
              hoverBackgroundColor: rows.map((row) => resolveHoverColor(row.color)),
              borderWidth: 0,
              hoverBorderWidth: 0,
              hoverOffset: 0,
              spacing: 0
            }
          ]
        },
        plugins: [labelPlugin],
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: {
            duration: 220,
            easing: "easeOutQuart"
          },
          transitions: {
            active: {
              animation: {
                duration: 120,
                easing: "easeOutQuart"
              }
            }
          },
          interaction: {
            intersect: true,
            mode: "nearest"
          },
          layout: {
            padding: 8
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              enabled: false,
              external: externalTooltip
            }
          }
        }
      });

      if (fallback) {
        fallback.dataset.ready = "true";
      }
      if (status) {
        status.textContent = "";
      }
    };

    loadChartJs(renderChart, () => {
      if (card) {
        card.dataset.error = "true";
      }
      if (status) {
        status.textContent = "Chart runtime failed to load; static fallback remains visible.";
      }
    });
  };

  widgets.forEach(initWidget);
})();
</script>
