<style>
:root {
  color-scheme: light;
  --surface: #F7F7F8;
  --surface-muted: #EFEFF2;
  --text: #171717;
  --text-muted: #52525B;
  --border: rgba(23, 23, 23, 0.12);
  --brand: #4B3FE3;
  --brand-soft: #F2F7FF;
  --brand-soft-strong: #E5EAFF;
  --brand-text: #1A1759;
  --brand-on: #FFFFFF;
  --chart-series-1: #3C2ECA;
  --chart-series-2: #A9AEFF;
  --chart-series-3: #6F6FFF;
  --chart-series-4: #22A5F7;
  --accent: #27D2BF;
  --accent-soft: #EAFBF8;
  --accent-text: #0F766E;
  --success: #1DC981;
  --warning: #EFAA17;
  --danger: #E8463A;
  --radius: 8px;
  --radius-card: 12px;
  --radius-full: 999px;
  --spacer-4: 4px;
  --spacer-8: 8px;
  --spacer-12: 12px;
  --spacer-16: 16px;
  --spacer-20: 20px;
  --spacer-24: 24px;
  --font-sans: "SF Pro Text", "PingFang SC", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --font-metric: "Inter", "SF Pro Text", "PingFang SC", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --weight-regular: 400;
  --weight-medium: 500;
  --weight-strong: 600;
  --text-caption: 12px/18px;
  --text-body: 14px/20px;
  --text-title: 16px/24px;
  --text-code: 13px/20px;
}

@media (prefers-color-scheme: dark) {
  :root {
    color-scheme: dark;
    --surface: #171717;
    --surface-muted: #262626;
    --text: #E5E5E5;
    --text-muted: #A1A1AA;
    --border: rgba(229, 229, 229, 0.12);
    --brand: #6054F1;
    --brand-soft: #1A1759;
    --brand-soft-strong: #3C2ECA;
    --brand-text: #CFD8FF;
    --chart-series-1: #4B3FE3;
    --accent-soft: #123F3C;
    --accent-text: #CCFBF1;
  }
}

.widget {
  color: var(--text);
  background: transparent;
  font: var(--weight-regular) var(--text-body) var(--font-sans);
  letter-spacing: 0;
  width: 100%;
}

.chartCard {
  box-sizing: border-box;
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  padding: var(--spacer-20);
}

.chartHeader {
  display: grid;
  gap: var(--spacer-4);
}

.chartTitle {
  margin: 0;
  color: var(--text);
  font: var(--weight-medium) var(--text-title) var(--font-sans);
}


.chartShell {
  position: relative;
  height: clamp(220px, 32vw, 320px);
  margin-top: var(--spacer-16);
}

.chartShell canvas {
  position: absolute;
  inset: 0;
  z-index: 1;
}

.chartFallback {
  position: absolute;
  inset: 0;
  z-index: 0;
  display: block;
  padding: var(--spacer-8) var(--spacer-8) 0;
  pointer-events: none;
}

.chartFallback[data-ready="true"] {
  opacity: 0;
}

.fallbackSvg {
  display: block;
  width: 100%;
  height: 100%;
}

.fallbackGrid {
  stroke: color-mix(in srgb, var(--border) 42%, transparent);
  stroke-width: 1;
}

.fallbackArea {
  fill: url(#lineTrendFallbackAreaGradient);
}

.fallbackLine {
  fill: none;
  stroke: var(--chart-series-1);
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.fallbackPoint {
  fill: var(--chart-series-1);
  stroke: var(--surface);
  stroke-width: 2;
}

.chartStatus {
  max-height: 0;
  margin: 0;
  overflow: hidden;
  color: var(--text-muted);
  font: var(--weight-regular) var(--text-caption) var(--font-sans);
  opacity: 0;
}

.chartCard[data-error="true"] .chartStatus {
  max-height: 40px;
  margin: var(--spacer-8) 0 0;
  opacity: 1;
}

.chartTooltip {
  --tooltip-x: 0px;
  --tooltip-y: 0px;
  position: absolute;
  top: 0;
  left: 0;
  z-index: 2;
  min-width: 128px;
  padding: 6px 10px;
  color: var(--text);
  background: color-mix(in srgb, var(--surface) 96%, #FFFFFF);
  border: 1px solid color-mix(in srgb, var(--border) 72%, transparent);
  border-radius: var(--radius);
  box-shadow: 0 8px 24px rgba(23, 23, 23, 0.08);
  opacity: 0;
  pointer-events: none;
  transform: translate3d(var(--tooltip-x), var(--tooltip-y), 0) translate(-50%, calc(-100% - 10px));
  transition: opacity 120ms ease, transform 120ms ease;
}

@media (prefers-color-scheme: dark) {
  .chartTooltip {
    background: color-mix(in srgb, var(--surface) 92%, #000000);
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
  }
}

.chartTooltip[data-visible="true"] {
  opacity: 1;
}

.chartTooltip[data-placement="bottom"] {
  transform: translate3d(var(--tooltip-x), var(--tooltip-y), 0) translate(-50%, 10px);
}

.tooltipRow {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: var(--spacer-8);
  font: var(--weight-regular) var(--text-caption) var(--font-sans);
}

.tooltipDot {
  display: block;
  width: 8px;
  height: 8px;
  border-radius: var(--radius-full);
  background: var(--chart-series-1);
}

.tooltipName {
  color: var(--text-muted);
}

.tooltipValue {
  color: var(--text);
  font: var(--weight-medium) var(--text-code) var(--font-mono);
  font-variant-numeric: tabular-nums;
}


@media (max-width: 520px) {
  .chartCard {
    padding: var(--spacer-16);
  }

  .chartShell {
    height: 220px;
  }
}
</style>
<div class="widget" data-dynamic-ui-widget data-template="line-trend">
  <section class="chartCard" aria-label="Line chart for desktop visitors">
    <div class="chartHeader">
      <h3 class="chartTitle">Line Chart</h3>
    </div>
    <div class="chartShell">
      <canvas aria-label="Desktop visitors by month" role="img"></canvas>
      <div class="chartFallback" aria-hidden="true">
        <svg class="fallbackSvg" viewBox="0 0 640 260" role="img" aria-label="Desktop visitor trend fallback">
          <defs>
            <linearGradient id="lineTrendFallbackAreaGradient" x1="0" y1="76" x2="0" y2="232" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="var(--chart-series-1)" stop-opacity="0.18"/>
              <stop offset="0.68" stop-color="var(--chart-series-1)" stop-opacity="0.06"/>
              <stop offset="1" stop-color="var(--chart-series-1)" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <path class="fallbackArea" d="M24 145C70 128 92 96 136 76C178 57 207 84 248 104C294 126 319 178 360 203C400 227 438 146 472 113C511 76 558 111 616 110L616 232H24Z"/>
          <path class="fallbackGrid" d="M12 32H628M12 82H628M12 132H628M12 182H628M12 232H628" fill="none"/>
          <path class="fallbackLine" d="M24 145C70 128 92 96 136 76C178 57 207 84 248 104C294 126 319 178 360 203C400 227 438 146 472 113C511 76 558 111 616 110"/>
          <circle class="fallbackPoint" cx="24" cy="145" r="4"/>
          <circle class="fallbackPoint" cx="136" cy="76" r="4"/>
          <circle class="fallbackPoint" cx="248" cy="104" r="4"/>
          <circle class="fallbackPoint" cx="360" cy="203" r="4"/>
          <circle class="fallbackPoint" cx="472" cy="113" r="4"/>
          <circle class="fallbackPoint" cx="616" cy="110" r="4"/>
        </svg>
      </div>
      <div class="chartTooltip" data-visible="false" data-placement="top" aria-hidden="true">
        <div class="tooltipRow">
          <span class="tooltipDot"></span>
          <span class="tooltipName">Desktop</span>
          <span class="tooltipValue">0</span>
        </div>
      </div>
    </div>
    <p class="chartStatus">Chart runtime failed to load; static fallback remains visible.</p>
  </section>
</div>
<script>
(() => {
  const rootSelector = '.widget[data-dynamic-ui-widget][data-template="line-trend"]:not([data-mounted])';
  const widgets = Array.from(document.querySelectorAll(rootSelector));
  if (widgets.length === 0) {
    return;
  }

  const chartData = [
    { month: "January", desktop: 186 },
    { month: "February", desktop: 305 },
    { month: "March", desktop: 237 },
    { month: "April", desktop: 73 },
    { month: "May", desktop: 209 },
    { month: "June", desktop: 214 }
  ];
  const xDataKey = "month";
  const seriesKey = "desktop";
  const chartConfig = {
    desktop: {
      label: "Desktop",
      color: "var(--chart-series-1)"
    }
  };

  const loadChartJs = (onReady, onError) => {
    if (window.Chart) {
      onReady();
      return;
    }

    const existingLoader = document.querySelector('script[data-dynamic-ui-chartjs="true"]');
    if (existingLoader) {
      if (existingLoader.dataset.status === "ready" && window.Chart) {
        onReady();
        return;
      }
      if (existingLoader.dataset.status === "error") {
        onError();
        return;
      }
      existingLoader.addEventListener("load", onReady, { once: true });
      existingLoader.addEventListener("error", onError, { once: true });
      return;
    }

    const loader = document.createElement("script");
    loader.src = "https://cdn.jsdelivr.net/npm/chart.js@4";
    loader.async = true;
    loader.dataset.dynamicUiChartjs = "true";
    loader.dataset.status = "loading";
    loader.onload = () => {
      loader.dataset.status = "ready";
      onReady();
    };
    loader.onerror = () => {
      loader.dataset.status = "error";
      onError();
    };
    (document.head || document.documentElement).appendChild(loader);
  };

  const initWidget = (widget) => {
    widget.dataset.mounted = "true";
  const canvas = widget.querySelector("canvas");
  const fallback = widget.querySelector(".chartFallback");
  const status = widget.querySelector(".chartStatus");
  const card = widget.querySelector(".chartCard");
  const tooltipEl = widget.querySelector(".chartTooltip");
  const tooltipName = widget.querySelector(".tooltipName");
  const tooltipValue = widget.querySelector(".tooltipValue");
  const styles = getComputedStyle(widget);
  const readVar = (name) => styles.getPropertyValue(name).trim();
  const resolveColor = (value) => {
    const match = /^var\((--[^)]+)\)$/.exec(value.trim());
    return match ? readVar(match[1]) || value : value;
  };
  const fadeRgba = (value, factor) => {
    const match = /rgba?\(([^)]+)\)/.exec(value);
    if (!match) {
      return value;
    }
    const parts = match[1].split(",").map((part) => part.trim());
    const alpha = parts[3] === undefined ? 1 : Number.parseFloat(parts[3]);
    const nextAlpha = Number.isFinite(alpha) ? Math.max(0, Math.min(1, alpha * factor)) : 0.05;
    return `rgba(${parts[0]}, ${parts[1]}, ${parts[2]}, ${nextAlpha})`;
  };
  // Assumption: Dynamic UI brand tokens resolve to hex or rgb values from the embedded token block.
  const withAlpha = (value, alpha) => {
    const color = value.trim();
    const hex = /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.exec(color);
    if (hex) {
      const raw = hex[1].length === 3
        ? hex[1].split("").map((part) => part + part).join("")
        : hex[1];
      const red = Number.parseInt(raw.slice(0, 2), 16);
      const green = Number.parseInt(raw.slice(2, 4), 16);
      const blue = Number.parseInt(raw.slice(4, 6), 16);
      return `rgba(${red}, ${green}, ${blue}, ${alpha})`;
    }

    const rgb = /rgba?\(([^)]+)\)/.exec(color);
    if (rgb) {
      const parts = rgb[1].split(",").map((part) => part.trim());
      return `rgba(${parts[0]}, ${parts[1]}, ${parts[2]}, ${alpha})`;
    }

    return color;
  };
  const rows = chartData
    .map((row) => {
      const raw = row[seriesKey];
      const value = typeof raw === "number" && Number.isFinite(raw) ? raw : null;
      return { label: String(row[xDataKey] ?? ""), value };
    })
    .filter((row) => row.label.length > 0);
  const hasRenderableValue = rows.some((row) => row.value !== null);

  if (!canvas || !hasRenderableValue) {
    if (card) {
      card.dataset.error = "true";
    }
    if (status) {
      status.textContent = "No valid chart data available.";
    }
    return;
  }

  const renderChart = () => {
    const brand = resolveColor(chartConfig[seriesKey].color);
    const surface = readVar("--surface");
    const textMuted = readVar("--text-muted");
    const border = readVar("--border");
    const grid = fadeRgba(border, 0.42);
    const ctx = canvas.getContext("2d");
    if (!ctx || !window.Chart) {
      return;
    }

    const areaFill = (context) => {
      const { chart } = context;
      const { chartArea } = chart;
      if (!chartArea) {
        return withAlpha(brand, 0.14);
      }

      const gradient = chart.ctx.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
      gradient.addColorStop(0, withAlpha(brand, 0.18));
      gradient.addColorStop(0.68, withAlpha(brand, 0.06));
      gradient.addColorStop(1, withAlpha(brand, 0));
      return gradient;
    };

    const externalTooltip = ({ chart, tooltip }) => {
      if (!tooltipEl || !tooltipName || !tooltipValue) {
        return;
      }
      if (tooltip.opacity === 0 || !tooltip.dataPoints || tooltip.dataPoints.length === 0) {
        tooltipEl.dataset.visible = "false";
        return;
      }

      const point = tooltip.dataPoints[0];
      tooltipName.textContent = chartConfig[seriesKey].label;
      tooltipValue.textContent = point.formattedValue;

      const width = chart.width;
      const tooltipWidth = tooltipEl.offsetWidth || 128;
      const x = Math.min(Math.max(tooltip.caretX, tooltipWidth / 2 + 6), width - tooltipWidth / 2 - 6);
      const y = tooltip.caretY;
      tooltipEl.dataset.placement = y < 52 ? "bottom" : "top";
      tooltipEl.style.setProperty("--tooltip-x", `${Math.round(x)}px`);
      tooltipEl.style.setProperty("--tooltip-y", `${Math.round(y)}px`);
      tooltipEl.dataset.visible = "true";
    };

    new window.Chart(ctx, {
      type: "line",
      data: {
        labels: rows.map((row) => row.label),
        datasets: [
          {
            label: chartConfig[seriesKey].label,
            data: rows.map((row) => row.value),
            borderColor: brand,
            backgroundColor: areaFill,
            borderWidth: 2,
            fill: "origin",
            clip: false,
            pointRadius: 4,
            pointBackgroundColor: brand,
            pointBorderColor: surface,
            pointBorderWidth: 2,
            pointHoverRadius: 6,
            pointHoverBackgroundColor: surface,
            pointHoverBorderColor: brand,
            pointHoverBorderWidth: 2,
            pointHitRadius: 12,
            borderCapStyle: "round",
            borderJoinStyle: "round",
            cubicInterpolationMode: "monotone",
            tension: 0.56,
            spanGaps: false
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: {
          duration: 220,
          easing: "easeOutQuart"
        },
        transitions: {
          active: {
            animation: {
              duration: 120,
              easing: "easeOutQuart"
            }
          }
        },
        interaction: {
          intersect: false,
          mode: "nearest",
          axis: "x"
        },
        hover: {
          intersect: false,
          mode: "nearest"
        },
        layout: {
          padding: { top: 14, right: 18, bottom: 0, left: 18 }
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            enabled: false,
            external: externalTooltip
          }
        },
        scales: {
          x: {
            border: { display: false },
            grid: { display: false },
            ticks: {
              color: textMuted,
              font: { size: 12, family: readVar("--font-sans") },
              maxRotation: 0,
              padding: 8,
              callback(value) {
                const label = this.getLabelForValue(value);
                return String(label).slice(0, 3);
              }
            }
          },
          y: {
            beginAtZero: true,
            border: { display: false },
            grid: {
              color: grid,
              lineWidth: 1,
              drawTicks: false
            },
            ticks: {
              display: false,
              maxTicksLimit: 4
            }
          }
        }
      }
    });

    if (fallback) {
      fallback.dataset.ready = "true";
    }
    if (status) {
      status.textContent = "";
    }
  };

  loadChartJs(renderChart, () => {
    if (card) {
      card.dataset.error = "true";
    }
    if (status) {
      status.textContent = "Chart runtime failed to load; static fallback remains visible.";
    }
  });
  };

  widgets.forEach(initWidget);
})();
</script>
